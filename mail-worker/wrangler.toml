name = "cloud-mail"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true

[observability]
enabled = true

#[[d1_databases]]
#binding = "db"
#database_name = ""
#database_id = ""

#[[kv_namespaces]]
#binding = "kv"
#id = ""

#[[r2_buckets]]
#binding = "r2"
#bucket_name = ""

[assets]
binding = "assets"
directory = "./dist"
not_found_handling = "single-page-application"

[triggers]
crons = ["0 16 * * *"]

[build]
command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"
